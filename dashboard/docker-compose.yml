version: "3.8"

services:
  penthouse-papi:
    build: .
    container_name: penthouse-papi
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - pp-memory:/app/memory
    env_file:
      - .env.local
    environment:
      - NODE_ENV=production
      - PORT=4000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:4000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  pp-memory:
    driver: local
